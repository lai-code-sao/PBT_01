<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hello JavaScript</title>
</head>
<body>
    <h1>Bài tập đầu tiên với JavaScript</h1>
    <p>Mở Console (F12 → Console) để xem kết quả</p>

    <script>
        // Bài 1: In ra console
        console.log("Xin chào thế giới!");
        console.log("Tôi đang học JavaScript");
        console.log(2026);
        
        // Bài 0.3
        let monHoc = "CSE391";
        let soTinChi = 3;
        let coBatBuocKhong = true;
        let diemSo;

        console.log("Môn học là:",typeof monHoc);
        console.log("Số tín  là:",typeof soTinChi);
        console.log("Có bắt buộc không?",typeof coBatBuocKhong);
        console.log("Điểm số chưa có là:",typeof diemSo);
        diemSo = 8;
        console.log("Điểm số đã có là:",typeof diemSo);

        // Bài 0.4:
        let sanPham = "Laptop";
        let soLuong = 2;
        let donGia = 15000000;
        let tongTien = soLuong * donGia;
        console.log(`Hóa đơn: ${soLuong} x ${sanPham} = ${(tongTien).toLocaleString()} VNĐ`);

        // Bài 0.5:
        const PI = 3.14159;
        let banKinh = 5;
        let dienTich = PI * (banKinh^2);
        let chuVi = 2 * PI * banKinh;
        let thongBao = `
        PI = ${PI}
        Bán kính = ${banKinh} 
        Diện tích = ${dienTich}
        Chu vi = ${chuVi}`
        console.log(thongBao);

        // Bài 0.6:
        let diem = 7.5;
        let diemChuyenCan = 9;
        if(diem>=5 && diemChuyenCan>=8){
            console.log("Đạt");
        }
        else{
            console.log("Không đạt");
        }
        if(diem>=8.5){
            console.log("Giỏi");
        }
        else if(diem>=8.5){
            console.log("Khá");
        }
        else if(diem>=8.5){
            console.log("Trung bình");
        }
        else{
           console.log("Yếu") 
        }

        // Bài 0.7:
        let monAnYeuTich=["Trứng rán","Cơm rang","Rau muống luộc","Vịt quay","Thịt lợn kho"];
        monAnYeuTich.push("Thịt gà kho gừng");
        monAnYeuTich.pop();
        monAnYeuTich.forEach((mon,index)=>{
            console.log(`Món ${index+1}: ${mon}`);
        });
        console.log(`Phở có trong mảng: ${monAnYeuTich.includes("Phở")}`);

        // Bài 0.8:
        let hoSo = {
            hoTen: "Vũ Anh",
            tuoi: 20,
            nganh: "KTPM",
            soThich: ["Ngủ","Ăn","Chơi"],
            diaChi:{
                duong: "Quan Nhân",
                quan: 1,
                tinh: "tpHCM"
            }
        };
        console.log(`Tôi là ${hoSo.hoTen}, ${hoSo["tuoi"]} tuổi, học ngành ${hoSo.nganh}`);
        console.log(`Sở thích đầu tiên: ${hoSo.soThich[0]}`);
        console.log(`Tôi ở đường ${hoSo.diaChi.duong}, quận ${hoSo.diaChi.quan}, thành phố ${hoSo.diaChi.tinh}`);
        hoSo.email = "abc@gmail.com";
    </script>
</body>
</html>
