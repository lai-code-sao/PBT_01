<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng</title>
</head>
<body>
    <table border="1">
        <caption>Giỏ hàng </caption>
        <thead>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiển</th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Áo sơ mi</td>
                <td>200.000đ</td>
                <td>1</td>
                <td>200.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ví tiền</td>
                <td>30.000đ</td>
                <td>3</td>
                <td>90.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Bát ăn cơm</td>
                <td>15.000đ</td>
                <td>4</td>
                <td>60.000đ</td>
            </tr>
        </tbody>
        <tfoot>
            <td colspan="4">Tổng</td>
            <td>350.000đ</td>
        </tfoot>
    </table>
    <form action="#" method="POST" id="paymentForm">
        <fieldset class="payment">
            <legend>Thanh toán</legend>
            <input type="radio" name="method" id="cod">
            <label for="cod">COD</label>
            <input type="radio" name="method" id="tranfer">
            <label for="tranfer"> Chuyển khoản</label>
            <input type="radio" name="method" id="electronicWallet">
            <label for="electronicWallet"> Ví điện tử</label>

            <label for="sale">Mã giảm giá:</label>
            <input type="text" 
            name="sale" 
            id="sale"
            placeholder="Mã giảm giá"
            pattern="SALE([0-9]{4})">
            
            <label for="note">Ghi chú:</label>
            <textarea name="note" id="note"></textarea>
        </fieldset>
    </form>
</body>
</html>
