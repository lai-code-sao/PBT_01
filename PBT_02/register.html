<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
</head>
<body>
    <form action="#" method="post">
        <fieldset class="personal-info">
            <legend>Thông tin cá nhân</legend>
            <label for="name">Họ tên:</label>
            <input type="text"
            name="name" 
            id="name"
            required
            minlength="2"
            maxlength="50"
            placeholder="Họ và tên">

            <label for="email">Email:</label>
            <input type="email"
            name="email"
            id="email"
            required
            placeholder="abc@gmail.com">

            <label for="phone-number">Số điện thoại:</label>
            <input type="tel" 
            name="phone-number" 
            id="phone-number"
            pattern="0[0-9]{10}"
            placeholder="0123456789">
        </fieldset>
        <fieldset class="account">
            <legend>Tài khoản</legend>
            <label for="username">Username:</label>
            <input type="text"
            name="username" 
            id="username"
            placeholder="Tên tài khoản"
            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{3,20}">
            <label for="password">Password:</label>
            <input type="password" 
            name="password" 
            id="password"
            pattern="(?=.*\d)(?=.*[A-Z]).+"
            minlength="8"
            placeholder="Mật khẩu">
        </fieldset>
        <fieldset class="delivery-info">
            <legend>Thông tin giao hàng</legend>
            <label for="city">Thành phố:</label>
            <select name="city" id="city">
                <option value="">--Chọn thành phố--</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hungyen">Hưng Yên</option>
                <option value="bacninh">Bắc Ninh</option>
                <option value="hagiang">Hà Giang</option>
                <option value="caobang">Cao Bằng</option>
            </select>

            <label for="district">Quận/huyện:</label>
            <select name="district" id="district">
                <option value="">--Chọn quận/huyện--</option>
                <option value="kienxuong">Kiến Xương</option>
                <option value="tienhai">Tiền Hải</option>
                <option value="hungha">Hưng Hà</option>
            </select>
            
            <label for="address">Địa chỉ chi tiết:</label>
            <textarea name="address" 
            id="address"
            rows="3">
            </textarea>

            <p>Giới tính:</p>
            <input type="radio" name="gender" id="male" checked>
            <label for="male">Nam</label>
            <input type="radio" name="gender" id="female" >
            <label for="female">Nữ</label>
            <input type="radio" name="gender" id="other" >
            <label for="other">Khác</label>
        </fieldset>
        <div class="end-form">
            <input type="checkbox" name="clause" id="clause" required>
            <label for="clause">Đồng ý điều khoản</label>
            <br>
            <button type="submit" 
            aria-label="Đăng ký"
            style="width: 100px; height: 50px;">Đăng ký</button>
            <button type="reset" 
            aria-label="Làm mới"
            style="width: 100px; height: 50px;">Làm mới</button>
        </div>
    </form>
</body>
</html>
