<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm</title>
    <style>
        img{
            width:100%;
            height:auto;
        }
    </style>
</head>
<body>
    <h1>Giới thiệu sản phẩm</h1>
    <main>
        <figure>
            <img src="https://songlongplastic.net/wp-content/uploads/2020/03/b%E1%BB%99-l%E1%BA%A1nh-b%E1%BA%A7u-song-long-2073.jpg" alt="Hộp nhựa đa năng đựng hoa quả đồ ăn tiện lợi">
            <ficaption>Hộp nhựa đa năng</ficaption>
        </figure>
        <figure>
            <img src="https://city89.com/wp-content/uploads/2023/04/sp-0051-mockup-black-front.jpg" alt="Áo thun mềm mại thoáng mát chất liệu cotton">
            <ficaption>Áo thun chất liệu cotton</ficaption>
        </figure>
        <figure>
            <img src="https://img.lazcdn.com/g/p/79d1b9a49ba20ac3715349f3be35960c.jpg_960x960q80.jpg_.webp" alt="Thìa ăn cơm hoạt hình cho trẻ em">
            <ficaption>Thìa ăn cơm hoạt hình </ficaption>
        </figure>
        <figure>
            <img src="https://fact-depot.com/tmp/cache/images/_thumbs/720x720/media/product/42037/Tui-bong-den-dung-rac.jpg"
             alt="Túi đựng rác màu đen 5kg"
             loading="lazy">
            <ficaption>
                Túi đựng rác màu đen 5kg
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bag" viewBox="0 0 16 16">
                    <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
                </svg>
            </ficaption>
        </figure>
        <figure>
            <img src="https://baongoctrading.com/wp-content/uploads/2019/10/C%E1%BB%91c-th%E1%BB%A7y-tinh-0101t.jpg" 
            alt="Cốc thủy tinh"
            loading="lazy">
            <figcaption>
                Cốc thủy tinh 
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cup" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M.11 3.187A.5.5 0 0 1 .5 3h13a.5.5 0 0 1 .488.608l-.22.991a3.001 3.001 0 0 1-1.3 5.854l-.132.59A2.5 2.5 0 0 1 9.896 13H4.104a2.5 2.5 0 0 1-2.44-1.958L.012 3.608a.5.5 0 0 1 .098-.42Zm12.574 6.288a2 2 0 0 0 .866-3.899zM1.124 4l1.516 6.825A1.5 1.5 0 0 0 4.104 12h5.792a1.5 1.5 0 0 0 1.464-1.175L12.877 4H1.123Z"/>
                </svg>
            </figcaption>
        </figure>
        <figure>
            <img src="https://zenio.vn/wp-content/uploads/2022/10/Vi%CC%81-nu%CC%9B%CC%83-Bella-Mini-Zenio-ma%CC%80u-ho%CC%82%CC%80ng..jpg"
            alt="Ví đựng tiền mini màu đỏ"
            loading="lazy">
            <ficaption>Ví đựng tiền mini</ficaption>
        </figure>
        <iframe width="320" 
            height="576" 
            src="https://www.youtube.com/embed/8hbeGvxrHI4" 
            title="Áo lẻ sọc phối chân váy hoặc quần tây" 
            frameborder="0" 
            allow="accelerometer; 
            autoplay; 
            clipboard-write; 
            encrypted-media; 
            gyroscope; 
            picture-in-picture; 
            web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
        <video controls
            width="640"
            height="360"
            poster="images/anh_mac_dinh.jpg"
            preload="metadata">
            <source src="videos/video_demo1.webm" type="video/webm">   <!-- WebM trước — nhẹ hơn -->
            <source src="videos/video_demo1.mp4" type="video/mp4">    <!-- MP4 fallback -->
            <p>Browser không hỗ trợ HTML5 video.
            <a href="videos/video_demo1.mp4">Tải video trực tiếp</a>
            </p>
        </video>
        <audio controls preload="none">
            <source src="sounds/1 Pista de Audio.ogg" type="audio/ogg">
            <source src="sounds/1 Pista de Audio.mp3" type="audio/mpeg">
            <p>Browser không hỗ trợ HTML5 audio.</p>
        </audio>
        <picture style="max-width: 100%; height: auto;">
            <source srcset="product.avif" type="image/avif">
            <source srcset="product.webp" type="image/webp">
            <img src="images/anh_mac_dinh.jpg"
                alt="Sản phẩm"
                loading="lazy">
        </picture>
    </main>
</body>
</html>
